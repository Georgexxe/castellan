# Castellan — per-agent Band credentials. Copy to `agent_config.yaml` and fill in.
# `agent_config.yaml` is gitignored; only this .example file is committed.
#
# Each agent is registered manually in the Band dashboard as an External Agent.
# Registration yields a UUID (agent_id) and an API key (shown ONCE — copy it then).
# The SDK's load_agent_config("scanner") reads ./agent_config.yaml from the working
# directory, so run agents from the repo root (cd castellan).

scanner:
  agent_id: ""   # Scanner agent UUID from Band
  api_key: ""    # Scanner agent API key from Band

controller:      # M2 — the Controller runs on Anthropic; needs its own Band creds to run
  agent_id: ""   # Controller agent UUID from Band
  api_key: ""    # Controller agent API key from Band

risk_policy:     # M3 — the Risk/Policy gate; register "Risk Policy" and add it to the room
  agent_id: ""   # Risk Policy agent UUID from Band
  api_key: ""    # Risk Policy agent API key from Band

action:          # M4 — the Action Layer identity (posts the human-approval request + executes);
  agent_id: ""   # register "Action Layer" and add it to the room. (Or set ACTION_AGENT_KEY=controller
  api_key: ""    # to reuse an existing identity for the gate dry-run.)

